version: '3.8'

# webLing 核心服务：backend + frontend + mongo（+ 可观测）。
#
# FunASR（流式 ASR）和 CosyVoice（TTS）作为独立部署存在于 deploy/funasr/ 和
# deploy/tts/ 下。backend 通过环境变量 FUNASR_WS_URL / TTS_BASE_URL 连接它们。
# 默认指向 host.docker.internal（本机 docker 方案）；跨机器部署时在 .env 改成
# 对应 IP:port（示例见 .env.example）。
#
# 部署顺序：
#   1. deploy/funasr/docker compose up -d     # 流式 ASR
#   2. deploy/tts/docker compose up -d        # CosyVoice（需 GPU）
#   3. docker compose up -d                   # 这份：backend+frontend+mongo

services:
  mongodb:
    image: mongo:7
    container_name: webling-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webling-backend
    ports:
      - "8000:8000"
    environment:
      - WEBLING_ENV=production
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=webling
      - TTS_PROVIDER=${TTS_PROVIDER:-cosyvoice}
      - TTS_BASE_URL=${TTS_BASE_URL:-http://host.docker.internal:5001}
      - FUNASR_WS_URL=${FUNASR_WS_URL:-ws://host.docker.internal:10095}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8080/v1}
    extra_hosts:
      # 让 Linux 容器里的 host.docker.internal 指向宿主机网关
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: webling-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: webling-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: webling-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo_data:
  grafana_data:
