<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>webLing Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f8fafc; color: #1e293b; height: 100vh;
    display: flex; flex-direction: column;
  }
  .header {
    padding: 12px 16px; background: #6366f1; color: white;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .header .status { font-weight: 400; opacity: 0.8; font-size: 12px; }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
  }
  .msg.user {
    align-self: flex-end; background: #6366f1; color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start; background: white; color: #1e293b;
    border: 1px solid #e2e8f0; border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center; background: #fef3c7; color: #92400e;
    font-size: 12px; border-radius: 8px;
  }
  .input-bar {
    padding: 12px 16px; border-top: 1px solid #e2e8f0; background: white;
    display: flex; gap: 8px;
  }
  .input-bar input {
    flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0;
    border-radius: 8px; font-size: 14px; outline: none;
  }
  .input-bar input:focus { border-color: #6366f1; }
  .input-bar button {
    padding: 10px 16px; background: #6366f1; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
  .subtitle { font-size: 12px; color: #64748b; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <span>webLing</span>
  <span class="status" id="status">连接中...</span>
</div>

<div class="messages" id="messages">
  <div class="msg system">正在初始化...</div>
</div>

<div class="input-bar">
  <input type="text" id="input" placeholder="输入消息..." disabled>
  <button id="send" disabled>发送</button>
</div>

<script>
(function() {
  const params = new URLSearchParams(location.search);
  const apiKey = params.get('apiKey') || '';
  const characterId = params.get('characterId') || 'ling';
  const baseUrl = location.origin;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendEl = document.getElementById('send');
  const statusEl = document.getElementById('status');

  let ws = null;
  let token = null;
  let sessionId = null;

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  async function fetchToken() {
    const res = await fetch(baseUrl + '/api/embed/token', {
      method: 'POST',
      headers: { 'X-API-Key': apiKey },
    });
    if (!res.ok) throw new Error('token: ' + res.status);
    const data = await res.json();
    token = data.token;
  }

  async function createSession() {
    const res = await fetch(baseUrl + '/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ character_id: characterId }),
    });
    if (!res.ok) throw new Error('session: ' + res.status);
    const data = await res.json();
    sessionId = data.session_id;
    if (data.greeting) addMessage(data.greeting, 'assistant');
  }

  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = proto + '://' + location.host + '/ws/chat?session_id=' + sessionId + '&token=' + token;
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus('已连接');
      inputEl.disabled = false;
      sendEl.disabled = false;
      inputEl.focus();
    };

    ws.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      switch (data.type) {
        case 'state':
          if (data.value === 'idle') setStatus('已连接');
          else if (data.value === 'processing') setStatus('思考中...');
          else if (data.value === 'speaking') setStatus('说话中...');
          break;
        case 'subtitle':
          if (data.is_final) {
            addMessage(data.text, 'assistant');
          }
          break;
        case 'error':
          addMessage('错误: ' + data.message, 'system');
          break;
      }
    };

    ws.onclose = () => {
      setStatus('已断开');
      inputEl.disabled = true;
      sendEl.disabled = true;
    };
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMessage(text, 'user');
    ws.send(JSON.stringify({ type: 'user_message', text }));
    inputEl.value = '';
  }

  sendEl.onclick = send;
  inputEl.onkeydown = (e) => { if (e.key === 'Enter') send(); };

  // 初始化
  (async () => {
    try {
      await fetchToken();
      await createSession();
      connectWs();
      // 清空初始系统消息
      messagesEl.innerHTML = '';
    } catch (err) {
      messagesEl.innerHTML = '';
      addMessage('初始化失败: ' + err.message, 'system');
      setStatus('错误');
    }
  })();
})();
</script>

</body>
</html>
